<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Attributes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<style>
    p{
        background-color: lightgray;
        width: 500px;
        height: 100px;
        /* font-family : 'Aria Black', sans-serif; */
        /* font-size: 20px; 
        font-weight:bold; */
        /* text-decoration: dotted underline; */
        text-transform:capitalize;
        line-height:22px;
    /* We can put also fonts style from google fonts by importing them in the head section of html file and link them above head section. */
    font-family: "Playfair Display", serif;
    font-optical-sizing: auto;
    font-weight: 400;
    font-style: normal;
    }
</style>
<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iusto quos labore minima consequuntur reprehenderit esse. Provident, nulla. Iusto, illo doloribus!</p>
</body>
</html>
