<style>
    .ProgressBar{
        background-color: orangered;
        height: 0.5vh;
        animation:LoadProgress 3s linear;
    }
    Header{
        background-color:black;
        height: 10vh;
    }
    Main{
        background-color: lightgray;
        height: 89.5vh;
    }
    @keyframes LoadProgress{
        0%{
            width:0;
        }
        20%{
            width:10%;
        }
        40%{
            width:10%;
        }
        70%{
            width:10%;
        }
        90%{
            width:10%;
        }
        100%{
            width:100%;
        }
    }
</style>
<body>

    <Header>
    </Header>
