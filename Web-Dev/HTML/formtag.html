<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tag</title>
</head>

<body>
    <form action="" method="get,post">
        <label>Name</label> <input type="text" value="VS Code" placeholder="Enter Your Name" />
        <br>
        <br>
        <label>Password</label> <input type="password" placeholder="Password" />
        <br>
        <br>
        <label>Gender</label> <input type="radio" name="handle" id="1" /><label for="1">Male</label><input type="radio"
            name="handle" id="2" /><label for="2">Female</label>
        <br>
        <br>
        <label>Hobbies</label> <input type="checkbox" name="hit" id="4" /><label for="4">Music</label><input
            type="checkbox" name="hit" id="5" /> <label for="5">Gardening</label><input type="checkbox" name="hit"
            id="6" /> <label for="6">Singing</label><input type="checkbox" name="hit" id="7" <label
            for="7">Watching</label>
        <br>
        <br>
        <label>Message</label> <textarea rows="5" cols="8">Already Written Message</textarea>
        <br>
        <br>
        <label>Country</label>
        <select size="3" name="" multiple>
            <option>India</option>
            <option>Pakistan</option>
            <option>America</option>
            <option selected>China</option>
        </select>
        <br>
        <br>
        <label>Electronics</label>
        <select>
            <optgroup label="Mobile">
                <option>Samsung</option>
                <option>Iphone</option>
                <option>Vivo</option>
            </optgroup>
            <optgroup label="PC">
                <option>HP</option>
                <option>DEL</option>
                <option>ACER</option>
            </optgroup>
            <optgroup label="LED" <option>Android</option>
                <option>China</option>
                <option>Japan</option>
            </optgroup>
        </select>
        <label>Cars</label><input list="car" />
        <datalist id="car">
            <option value="GLI">
            <option value="XLI">
            <option value="Rolls Royce">
            <option value="Civic">
        </datalist>
        <label>Upload File</label> <input type="file" name="" accept="image/*" />
        <br>
        <input type="submit" value="Save" />
        <br>
        <input type="button" value="Confirm" />
        <br>
        <input type="reset" />
