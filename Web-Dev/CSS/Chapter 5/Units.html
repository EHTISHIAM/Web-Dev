<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units other Than Pixels</title>
</head>
<style>
.content {
    font-size: 34px;
}
.cont{
    /* font-size: 2em; 
    The em units is equal to the times of parent div value in any unit like multiple of 2 with 34 px to get 2em */
    font-size : 2rem;
    /* The rem unit is equal to the root element font size value in any unit like multiple of 3 with 16 px to get 3rem  Root element here is HTMl which has 16px default size The default 16px of root element can be change by this html:18px ;*/
    background-color:blueviolet;
    width : 50vw;
    /* The vw unit is equal to the percentage of viewport width 50vw means 50% of viewport width of that display like tablet and mobile phone laptop etc*/
    height : 60vh;
    /* The vh unit is equal to the percentage of viewport height 20vh means 20% of viewport height of that display like tablet and mobile phone laptop etc*/
}
</style>
<body>
    <div class="content">
        <p>This Is the CSS</p>
    <div> 
        <p class="cont">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatum temporibus dolorum nesciunt porro?</p>
    </div>
        
    </div>
</body>
</html>
