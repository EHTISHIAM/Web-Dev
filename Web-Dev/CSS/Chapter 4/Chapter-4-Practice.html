<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 4 Practice</title>
</head>
<style>
    header{
        background-color:rgba(164, 213, 213, 0.721);
        height:69px;

    }
    ul li a{
        text-decoration:none;
        color:rgb(158, 143, 121);
        font-size:20px;
        padding: 15px;
        margin: 10px;
    }
    ul li{
        display:inline;

        padding:30px;
    }
    footer{
        background-color: aqua;
        color:rgba(3, 53, 37, 0.842)
    }
    .content{
        text-align: center;
        text-transform: uppercase;
        padding: 10px;
        margin: 0px;
    }
    .left{
        background-color: lightcoral;
        width: 50%;
        height: 400px;
        display: inline-block;
    }
    .right{
        background-color: rgb(200, 144, 238);
        width: 50%;
        height: 400px;
        display: inline-block;
    }
    div{    
        padding:0px;
        margin:0px;
    }

<body>
    <header>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </header>
    <div class="left">Lorem, ipsum dolor.</div><div class="right">Lorem, ipsum dolor.</div>
    <footer>
        <p class="content">Copyright &copy; Practice Set 4</p>
