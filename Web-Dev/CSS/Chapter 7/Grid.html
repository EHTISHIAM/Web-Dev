<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
</head>
<style>
    container{
        background-color: lightpink;
        display: grid;
        grid-template-columns: auto auto auto auto;
        /* grid-column-gap : 10px;
        grid-row-gap: 5px; */
        grid-gap:5px 10px;  /*1 Value is fot both row and column gap, 2 Values first for row gap and second for column gap */
        height: 65vh;
        /* justify-content: right; */
        align-items: center;
    }
    .item{
        border: 2px solid black;
        height: 20vh;
    }
</style>
<body>
    <container>
        <div class="item" style="grid-column: 1 /3">Box1</div>
        <div class="item">Box2</div>
        <div class="item">Box3</div>
        <div class="item">Box4</div>
        <div class="item">Box5</div>
        <div class="item">Box6</div>
        <div class="item">Box7</div>
        <div class="item">Box8</div>
        <div class="item">Box9</div>
    </container>
</body>
</html>
