<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 6 Practice</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
    }
    header {
        background-color: lightgray;
        height: 15vh;
    }

    ul {
        list-style: none;
        display: flex;
        align-items:flex-end;
        justify-content:space-around;
        /* align-content: center; */
        padding: 4vh;
    }

    li {
        font-size: 4vw;
        padding: 0px 12px 0px 0px;
    }

    .Image {
        font-size: 5vw;
        font-weight: bold;
        order:-1;
        width: fit-content;
        flex-grow:1;
    }
    .Home{
        font-size: 5vw;
        font-weight: bold;;
        order:0;
        justify-self: right ;
        width: fit-content;
    }
    .Contact{
        font-size: 5vw;
        font-weight: bold;;
        order:1;
        width: fit-content;
    }
    .About{
        font-size: 5vw;
        font-weight: bold;;
        order:2;
        width: fit-content;
    }
</style>
<body>
    <header>
        <div class="container">
            <nav>
                <ul>
                    <li class="Image">Image</li>
                    <li class="Home">Home</li>
                    <li class="Contact">Contact</li>
                    <li class="About">About</li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
