<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float and Clear Attributes</title>
</head>
<style>
    .box1 {
        background-color: rosybrown;
        width: 222px;
        height: 222px;
        float: left;
    }

    .box2 {
        background-color: rgb(58, 3, 141);
        width: 222px;
        height: 222px;
        float: right;
        clear: right;
    }
</style>

<body>
    <div class="box1">BOX 1</div>
    <div class="box2">BOX 2</div>
</body>

</html>
