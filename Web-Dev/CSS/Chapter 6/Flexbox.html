<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
</head>
<style>
    .container {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        background-color: lightpink;
        height: 100vh;
        justify-content: flex-start;
        align-items: center;
        /* align-content: center;*/
    }

    .box1 {
        background-color: rosybrown;
        /* width:222px;
        height:222px; */
        border: 2px dotted black;
        order: 4;
        align-self: flex-end;
        /* To apply the align-self property to this specific box only and you need to remove the align-content property from the container. */
        /* flex-grow :5; */
        flex-shrink: 1;
    }

    .box2 {
        background-color: rgb(58, 3, 141);
        /* width:222px;
        height:222px; */
        border: 2px dotted black;
        flex-shrink: 1;
    }

    .box3 {
        background-color: rgb(12, 141, 3);
        /* width:222px;
        height:222px; */
        border: 2px dotted black;
        flex-grow: 1;
        /* flex-shrink:1; */
    }

    .box4 {
        background-color: rgb(141, 3, 24);
        /* width:222px;
        height:222px; */
        border: 2px dotted black;
        /* flex-grow:1; */
        flex-shrink: 1;
    }
</style>

<body>
    <div class="container">
        <div class="box1">BOX 1</div>
        <div class="box2">BOX 2</div>
        <div class="box3">BOX 3</div>
        <div class="box4">BOX 4</div>
    </div>
</body>

</html>
