<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        display: flex;
        flex-wrap: wrap;
        gap : 20px;
    }
    .box1 .box2 .box3 .box4 { flex: 1 0 300px; /* Grow, shrink, basis */}
    .box1 {
        background-color: rosybrown;
        border: 2px dotted black;
        width:222px;
        height:222px;
    }

    .box2 {
        background-color: rgb(58, 3, 141);
        width:222px;
        height:222px;
        border: 2px dotted black;
        flex-shrink: 1;
    }

    .box3 {
        background-color: rgb(12, 141, 3);
        border: 2px dotted black;
        width:222px;
        height:222px;
    }

    .box4 {
        background-color: rgb(141, 3, 24);
        border: 2px dotted black;
        width:222px;
        height:222px;
    }
</style>
<body>
    <div class="container">
        <div class="box1">BOX 1</div>
        <div class="box2">BOX 2</div>
        <div class="box3">BOX 3</div>
        <div class="box4">BOX 4</div>
    </div>
</body>
</html>
