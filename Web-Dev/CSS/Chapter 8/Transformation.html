<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Property</title>
</head>
<style>
.container{
    background-color: rgb(168, 32, 32);
    width: 100vw;
    height: 100vh;
}
.box{
    border:2px solid black;
    transform: translate(23px,45px) rotate(0.5turn) ;
}
img{
    width: 300px;
    height:400px;
    /* transform: translate(2px,50px); */
    /* transform: skew(89deg,0deg); */
    /* transform: rotate(1.5turn); */
    /* transform:scale(1 ,1); */
    /* display: inline-block; */
    transform: matrix(1, 0 ,0, 1, 23, 67);
    /* transform: rotateZ(1.5deg);  */
    transition-duration: 1s;
    transition-property: width, height;
    transition-timing-function: ease-in-out;
    transition-delay: 3s;
}
img:hover{
    width: 100px;
    height:150px;
}
</style>
<body>
    <div class="container">
        <div class="box">Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestias quas, quos in adipisci sunt voluptatem dolores corrupti incidunt vel inventore.</div>
        <img src="https://images.unsplash.com/photo-1488272690691-2636704d6000?q=80&w=2067&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Chain">
        </div>
</body>
</html>
